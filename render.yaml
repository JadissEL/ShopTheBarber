# Render Blueprint: deploy backend (API) from this repo.
# Frontend: deploy separately on Vercel (see docs/DEPLOYMENT.md).

services:
  - type: web
    name: shopthebarber-api
    runtime: node
    rootDir: server
    # Postgres: `DATABASE_URL` + build-database → `drizzle-kit migrate`.
    # One-time empty DB on Postgres: set env `DRIZZLE_BOOTSTRAP=push`, deploy once, then remove (runs `push` — review diff).
    # SQLite (no DATABASE_URL): wipes local sqlite + push — server/scripts/build-database.mjs.
    buildCommand: npm install --include=dev && node scripts/build-database.mjs
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
        # Omit for SQLite build (current default). Link Render Postgres or paste external URL → build runs `drizzle-kit migrate`.
      - key: DRIZZLE_BOOTSTRAP
        sync: false
        # Optional: set to `push` for **one** Postgres cold-start deploy only, then delete (see AGENTS.md).
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
        # Set in Render Dashboard to your Vercel URL, e.g. https://your-app.vercel.app
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
