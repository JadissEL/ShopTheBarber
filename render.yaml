# Render Blueprint: deploy backend (API) from this repo.
# Frontend: deploy separately on Vercel (see docs/DEPLOYMENT.md).
# Database: Prisma + Neon PostgreSQL only. Build runs `prisma generate` + `prisma migrate deploy`.

services:
  - type: web
    name: shopthebarber-api
    runtime: node
    rootDir: server
    buildCommand: npm install --include=dev && node scripts/build-database.mjs
    startCommand: npm run start
    healthCheckPath: /api/health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
        # Required. Neon PostgreSQL connection string (used by Prisma at build + runtime).
      - key: CLERK_SECRET_KEY
        sync: false
        # Required. Clerk backend secret (server-side token verification).
      - key: UPSTASH_REDIS_REST_URL
        sync: false
        # Required. Upstash Redis REST URL for distributed rate limiting.
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
        # Required. Upstash Redis REST token.
      - key: MAPBOX_ACCESS_TOKEN
        sync: false
        # Required for production geocoding (or use GOOGLE_MAPS_API_KEY instead).
      - key: GOOGLE_MAPS_API_KEY
        sync: false
        # Optional alternative geocoding provider.
      - key: GEOCODING_PROVIDER
        sync: false
        # Optional: mapbox | google | nominatim (default auto).
      - key: FRONTEND_URL
        sync: false
        # Set to your Vercel URL, e.g. https://your-app.vercel.app
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
        # Optional but recommended. Server-side error tracking (https://sentry.io).
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
      - key: SENTRY_RELEASE
        sync: false
        # Optional. Set to git SHA; Render sets RENDER_GIT_COMMIT automatically if unset.
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: CRON_SECRET
        sync: false
        # Same value as GitHub secrets CRON_SECRET (booking-sms-reminders + financial-trust-cron).
      - key: RESEND_API_KEY
        sync: false
        # Required for waitlist offer emails and transactional mail (see server/.env.example).
      - key: EMAIL_FROM
        sync: false
        # Sender address for Resend, e.g. ShopTheBarber <noreply@yourdomain.com>
      - key: BACKEND_URL
        sync: false
        # Public API URL (same host as this service); used in email deep links.
      - key: SMS_REMINDER_HOURS_BEFORE
        value: "24"
