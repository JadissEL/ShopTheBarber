  <!-- Recover from stale PWA/browser cache serving old split vendor chunks (React Children error). -->
  <script>
    (function () {
      var STALE = /vendor-react-|vendor-CLz_/;
      var scripts = document.querySelectorAll('script[src]');
      for (var i = 0; i < scripts.length; i++) {
        if (STALE.test(scripts[i].src || '')) {
          try { localStorage.setItem('stb-cache-recovery', '1'); } catch (e) {}
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            }).finally(function () {
              if ('caches' in window) {
                caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                }).finally(function () { location.reload(); });
              } else {
                location.reload();
              }
            });
          } else {
            location.reload();
          }
          return;
        }
      }
    })();
  </script>
