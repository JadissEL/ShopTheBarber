# CI runs on master (validation) and main (re-verify after promotion).
# Development and PRs target master. Only promote master → main after CI passes on master.
# Production deploys use main only.
# Optional staging E2E: Actions → Playwright API checks (workflow_dispatch; see AGENTS.md).
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  server:
    name: Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Integration tests import Fastify + Drizzle; sovereign.sqlite is empty on a clean runner.
      # Push applies src/db/schema.ts (no DATABASE_URL → SQLite per drizzle.config.ts).
      - name: Apply SQLite schema for tests
        run: npx drizzle-kit push --force

      - name: Test
        run: npm run test
